<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DejaView — pure-JS DjVu reader</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="toolbar">
    <div class="group">
      <button id="toggleThumbs" title="Toggle thumbnails">☰</button>
    </div>
    <div class="group">
      <button id="open" title="Open a .djvu file">Open…</button>
      <input type="file" id="file" accept=".djvu,.djv,image/vnd.djvu" hidden />
    </div>
    <div class="group">
      <button id="prev" title="Previous page">◀</button>
      <input type="number" id="pageNum" min="1" value="1" />
      <span id="pageCount">/ 0</span>
      <button id="next" title="Next page">▶</button>
    </div>
    <div class="group">
      <button id="zoomOut" title="Zoom out">−</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomIn" title="Zoom in">+</button>
      <button id="fitWidth" title="Fit width">Fit width</button>
      <button id="fitPage" title="Fit page">Fit page</button>
    </div>
    <div class="group grow">
      <input type="search" id="search" placeholder="Search text…" />
      <button id="searchPrev" title="Previous match">▲</button>
      <button id="searchNext" title="Next match">▼</button>
      <span id="searchInfo"></span>
    </div>
  </header>

  <div id="body">
    <aside id="thumbs" class="hidden"></aside>
    <main id="viewport">
      <div id="stage">
        <canvas id="page"></canvas>
        <div id="textLayer"></div>
        <div id="highlights"></div>
      </div>
      <div id="dropHint">
        <div id="openZone">
          <svg class="cloud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 16l-4-4-4 4" /><path d="M12 12v9" />
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
          </svg>
          <h1>Open document</h1>
          <p class="sub">Drop a <code>.djvu</code> file here, or <button id="openInline" class="linkbtn">browse</button></p>
          <div class="formats" aria-hidden="true">
            <span class="fmt b1">JB2</span><span class="fmt b2">IW44</span><span class="fmt b3">MMR</span>
            <span class="fmt b4">JPEG</span><span class="fmt b5">BZZ</span><span class="fmt b6">ZP</span>
            <span class="fmt b7">TEXT</span><span class="fmt b8">ANNOT</span>
          </div>
          <p class="powered">Pure-JavaScript DjVu — every layer, zero dependencies&nbsp;·&nbsp;<button id="loadSample" class="linkbtn">try a sample&nbsp;→</button></p>
        </div>
      </div>
    </main>
  </div>

  <div id="status"></div>
  <script type="module" src="src/viewer.js"></script>
</body>
</html>
